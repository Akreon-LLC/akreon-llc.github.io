---
layout: default
---
<main class="site-main">
  <article class="page-shell">
    <div class="container reading-width">
      {% if page.entry_type %}
        <p class="section-label">{{ page.entry_type }}</p>
      {% endif %}
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
        <p class="page-lead">{{ page.description }}</p>
      {% endif %}
      <div class="prose">
        {{ content }}
      </div>
    </div>
  </article>
</main>

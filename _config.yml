# ----
# Site

title: Akreon
url: "https://akreon.ai"
baseurl:
logo: /images/favicon.png
description: Akreon is a cloud-backed engineering platform for deployable control software, feedback control and estimation, constrained workflows, and embedded C/C++ artifacts.
author:
  name: Akreon
  email: hello@akreon.ai
social:
  name: Akreon
  links:
    - https://akreon.ai

# -----
# Build

timezone: Etc/UTC

permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "index.html"
    values:
      layout: "default"

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
